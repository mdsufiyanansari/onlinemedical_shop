<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicine Details - MediCare Pharmacy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="navbar">
  <div class="header-container">
    <div class="logo">
      <i class="fas fa-pills"></i>
      <span>MediCare</span>
    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
      <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="badge">0</span></a>
    </nav>
  </div>
</header>

<div style="max-width: 1200px; margin: 3rem auto; padding: 2rem;">
  <a href="index.html" class="nav-link" style="color: #667eea; margin-bottom: 1rem; display: inline-block;">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>
</div>

<div class="product-page" id="productPage"></div>

<section style="max-width: 1200px; margin: 0 auto; padding: 3rem 2rem;">
  <h2 class="title">Related Products</h2>
  <div class="products" id="relatedProducts"></div>
</section>

<!-- Auth Modal -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Login</h2>
      <span class="close-modal" id="closeModal">&times;</span>
    </div>
    <div class="modal-body">
      <form id="authForm">
        <div id="nameField" class="form-group" style="display:none;">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" class="form-input">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="authEmail" placeholder="Enter your email" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="authPassword" placeholder="Enter your password" class="form-input" required>
        </div>
        <button type="submit" class="auth-btn" id="authSubmitBtn">Login</button>
      </form>
      <p class="toggle-auth">
        Don't have an account? <a href="#" id="toggleSignup">Sign up here</a>
      </p>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div class="footer-section">
      <h4><i class="fas fa-pills"></i> MediCare</h4>
      <p>Your trusted online medical store</p>
    </div>
    <div class="footer-section">
      <h4>Quick Links</h4>
      <ul>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Shipping Info</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2024 MediCare Pharmacy. All rights reserved.</p>
  </div>
</footer>

<script src="product.js"></script>
</body>
</html>
